name: CI

on:
  push:
    branches: [main, master, "codex/*"]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Lint with ruff
        run: python -m ruff check src tests

      - name: Type check with mypy
        run: python -m mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies for WeasyPrint and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango1.0-dev libcairo2-dev libgdk-pixbuf2.0-dev fonts-noto-cjk

      - name: Install package + optional backends
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,playwright,weasyprint,legacy-pdf]'
          python -m playwright install chromium

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src python -m pytest -q --cov=epub2pdf_cli --cov-report=xml --cov-fail-under=60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Run CLI smoke test
        run: |
          python -m epub2pdf_cli --help
          python -m epub2pdf_cli pdf-extract --help
          python -m epub2pdf_cli batch --help
