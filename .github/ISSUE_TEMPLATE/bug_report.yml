name: Bug Report
description: Report a problem with epub2pdf
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: epub2pdf version
      placeholder: "e.g., 0.3.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g., 3.11.4"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g., macOS 14 / Ubuntu 22.04"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command that triggered the bug
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      render: shell
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: If possible, attach or link to the smallest EPUB that triggers the issue.
