name: Feature Request
description: Suggest an idea for epub2pdf
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the core mission (EPUB ↔ PDF conversion and extraction)
